# .convoy/manifest.yaml
# Convoy only touches files listed here. Everything else is developer-owned.
version: 1
project: urbanize
platform: fly
topology: web+worker
owned_files:
  - path: .env.schema
    purpose: required environment variable contract
  - path: .convoy/manifest.yaml
    purpose: self — tracks Convoy-owned files
unowned_but_detected:
  - path: Dockerfile
    note: developer-authored, node:20-alpine — not modified
  - path: fly.toml
    note: developer-authored — not modified
rehearsal:
  target: fly-ephemeral
  region: iad
  smoke: "tsx --env-file=.env.local --test tests/**/*.test.ts"
